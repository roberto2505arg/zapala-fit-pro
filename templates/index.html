<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zapala Fit - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <header class="header-main">
        <h1 class="logo-font">ZAPALA<span>FIT</span></h1>
        <div id="userDisplay" style="color: #888; font-size: 0.7rem; margin-bottom: 10px;">CONECTADO_SYS</div>
        <button id="btnLogout" class="btn-logout"><i class="fas fa-power-off"></i> STANDBY</button>
    </header>

    <div class="card">
        <h3 class="seccion-titulo"><i class="fas fa-calculator"></i> MÉTRICAS_BASE</h3>
        <div class="grid-inputs">
            <div class="input-group">
                <label>PESO (KG)</label>
                <input type="number" id="peso" step="0.1" placeholder="00.0">
            </div>
            <div class="input-group">
                <label>ALTURA (CM)</label>
                <input type="number" id="altura" placeholder="170">
            </div>
            <div class="input-group">
                <label>EDAD</label>
                <input type="number" id="edad" value="42">
            </div>
            <div class="input-group">
                <label>SEXO</label>
                <select id="sexo">
                    <option value="H">MASCULINO</option>
                    <option value="M">FEMENINO</option>
                </select>
            </div>
        </div>
        
        <div class="grid-inputs" style="margin-top:15px;">
            <div class="input-group">
                <label>ACTIVIDAD</label>
                <select id="actividad">
                    <option value="1.2">SEDENTARIO</option>
                    <option value="1.375">LIGERO (1-3 d)</option>
                    <option value="1.55">MODERADO (3-5 d)</option>
                    <option value="1.725">FUERTE (6-7 d)</option>
                </select>
            </div>
            <div class="input-group">
                <label>DÉFICIT</label>
                <select id="intensidadDeficit">
                    <option value="0.10">LEVE (10%)</option>
                    <option value="0.20" selected>ESTÁNDAR (20%)</option>
                    <option value="0.25">AGRESIVO (25%)</option>
                </select>
            </div>
        </div>

        <div class="resultados-grid">
            <div class="res-box">
                <span class="label">IMC</span>
                <span id="imcBadge" class="valor">0.0</span>
            </div>
            <div class="res-box">
                <span class="label">META DIARIA</span>
                <span id="calObj" class="valor">0 kcal</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="rutina-header">
            <h3 id="semanaDisplay" class="semana-label">SEMANA 1</h3>
            <div class="selector-tipo">
                <button onclick="window.renderRutina('fuerza')" class="btn-tipo active">FUERZA</button>
                <button onclick="window.renderRutina('cardio')" class="btn-tipo">CARDIO</button>
            </div>
        </div>

        <div id="listaEjercicios" class="lista-check">
            </div>

        <div class="progreso-container">
            <div class="barra-base">
                <div id="barraRelleno" class="barra-relleno"></div>
            </div>
            <span id="porcentajeProgreso">0%</span>
        </div>
    </div>

    <div class="card timer-card">
        <div class="timer-wrapper">
            <svg class="timer-svg" viewBox="0 0 100 100">
                <circle class="timer-fondo" cx="50" cy="50" r="45"></circle>
                <circle id="progresoReloj" class="timer-progreso" cx="50" cy="50" r="45"></circle>
            </svg>
            <div id="timerDisplay" class="timer-text">00:30</div>
        </div>
        <div class="timer-controles">
            <button onclick="window.ajustarTimer(-10)">-10s</button>
            <button id="btnStartTimer" onclick="window.toggleTimer()" class="btn-play"><i class="fas fa-play"></i></button>
            <button onclick="window.ajustarTimer(10)">+10s</button>
        </div>
    </div>

    <div class="card agua-card" onclick="window.sumarAgua()">
        <i class="fas fa-tint"></i>
        <div class="agua-info">
            <span class="label">HIDRATACIÓN</span>
            <span id="aguaContador" class="valor">0 L</span>
        </div>
        <small>TOCA PARA SUMAR 250ml</small>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 class="seccion-titulo">HISTORIAL_REC</h3>
            <button id="btnBorrarTodo" class="btn-danger-mini"><i class="fas fa-trash"></i> BORRAR</button>
        </div>
        <div id="listaHistorial" class="historial-lista">
            </div>
    </div>

    <button id="btnGuardar" class="btn-finalizar">FINALIZAR JORNADA</button>
</div>

<a href="https://wa.me/5492974802505?text=Hola!%20Consulta%20desde%20ZapalaFit" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
    <span class="wa-tooltip">CONTACTO</span>
</a>

<script type="module" src="{{ url_for('static', filename='js/scripts.js') }}"></script>

</body>
</html>
